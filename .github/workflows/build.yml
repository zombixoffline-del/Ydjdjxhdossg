name: Build Kivy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            autoconf automake libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache \
            libltdl-dev

      - name: Set JAVA_HOME
        run: echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache Buildozer toolchain
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      # --- ЭТОТ ШАГ ИСПРАВЛЯЕТ ТВОЮ ОШИБКУ ---
      - name: Prepare Android SDK & Accept Licenses
        run: |
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          # Создаем папки, если их нет
          mkdir -p $ANDROID_HOME/cmdline-tools/latest

          # Скачиваем cmdline-tools, если они еще не скачаны
          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "Downloading command line tools..."
            cd $ANDROID_HOME/cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools $ANDROID_HOME/cmdline-tools/temp
            mv $ANDROID_HOME/cmdline-tools/temp $ANDROID_HOME/cmdline-tools/latest
            cd -
          fi

          # ПРИНУДИТЕЛЬНО принимаем все лицензии (убирает вопрос Accept? y/N)
          echo "Accepting SDK licenses..."
          yes | sdkmanager --licenses

          # Ставим компоненты, совместимые с android.api = 34
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9245854"
      # ----------------------------------------

      - name: Build APK
        run: buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kivy-app
          path: bin/*.apk
