name: Build Kivy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache \
            libltdl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      # ШАГ 1: Сначала ставим сами инструменты (cmdline-tools), чтобы sdkmanager точно существовал
      - name: Install Android SDK tools
        run: |
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools/latest

          if [ ! -f "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" ]; then
            echo "Downloading command line tools..."
            cd $ANDROID_HOME/cmdline-tools
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools $ANDROID_HOME/cmdline-tools/temp
            mv $ANDROID_HOME/cmdline-tools/temp $ANDROID_HOME/cmdline-tools/latest
            cd -
          fi

          # Добавляем sdkmanager в PATH для этого шага
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH

          echo "Installing SDK components..."
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;25.2.9245854"

      # ШАГ 2: Теперь, когда sdkmanager точно есть, спокойно принимаем лицензии
      - name: Accept Android SDK licenses
        run: |
          export ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$PATH
          echo "Accepting licenses..."
          yes | sdkmanager --licenses

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kivy-app
          path: bin/*.apk
