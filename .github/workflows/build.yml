name: Build Kivy APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev \
            build-essential \
            ccache \
            libltdl-dev

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install buildozer cython

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

      # ИСПРАВЛЕННЫЙ ШАГ: без жёсткой версии NDK, с запасным вариантом build-tools
      - name: Prepare Android SDK (stable versions)
        run: |
          ANDROID_HOME=~/.buildozer/android/platform/android-sdk
          CMDLINE_DIR=$ANDROID_HOME/cmdline-tools
          LATEST_DIR=$CMDLINE_DIR/latest
          
          mkdir -p $LATEST_DIR

          if [ ! -f "$LATEST_DIR/bin/sdkmanager" ]; then
            echo "Downloading command line tools..."
            cd $CMDLINE_DIR
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
            unzip -q cmdline-tools.zip
            mv cmdline-tools/* $LATEST_DIR/
            cd -
          fi

          export PATH=$LATEST_DIR/bin:$PATH

          echo "Installing SDK components..."
          # ВАЖНО: убрали жёсткий ndk;25.2..., теперь sdkmanager сам подберёт совместимый
          # Также добавили запасной build-tools;33.0.2, если 34.0.0 вдруг не найдётся
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" || sdkmanager "build-tools;33.0.2"

          echo "Accepting licenses..."
          yes | sdkmanager --licenses

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kivy-app
          path: bin/*.apk
